<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Photography</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <meta name="description" content="Personal photography portfolio for Silas Unger." />
        <meta name="theme-color" content="#000000">
        <link rel="icon" href="/images/favicon.ico">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Jacquard+24&family=Jersey+10&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="/style.css">

        <style>
            .grid.container {
                padding: 0;
                display: grid;

                grid-template-columns: repeat(2, 1fr);
                margin-bottom: 60px;
                grid-auto-flow: dense;
            }

            .box {
                
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;

                position: relative;

                aspect-ratio: 1 / 1;
            }

            .lightbox {
                image-rendering: auto;
                box-sizing: border-box;

                padding: 25px;

                width: 100%;
                height: 100%;
                
                object-fit: cover;
            }

            .wide {
                grid-column: span 2;
                aspect-ratio: 2 / 1;
            }

            .tall {
                grid-row: span 2;
                aspect-ratio: 1 / 2;
            }

            @media only screen and (max-width: 600px) {

                .grid.container {
                    grid-template-columns: repeat(1, 1fr);
                }

                .box {
                    grid-column: span 1;
                    grid-row: span 1;

                    aspect-ratio: auto;
                }
            }
        
        </style>
    </head>
    <body>
        <div class="parallax-bg"></div>

        <div id="popup" class="popup">
            <span class="close">&times;</span>

            <span class="arrow left"><</span>
            <img id="popup-img">
            <span class="arrow right">></span>

            <div id="popup-caption" class="caption">cat</div>
        </div>

        <div class="team outline">
            <a href="/">
                <img src="/images/home.png" width="200px">
            </a>
        </div>

        <div class="container outline header">
            <img src="/images/photos.png">
        </div>

        <h2 class="center blink">my photos — click to enlarge</h2>

        <div class="grid container">
            <div class="box outline">
                <img class="lightbox" data-caption="Hiking @ Poo Poo Point" src="/images/photography/IMG_8519.jpg">
            </div>
            <div class="box outline tall">
                <img class="lightbox" data-caption="Hiking @ Poo Poo Point" src="/images/photography/IMG_8533.jpg">
            </div>
            <div class="box outline tall">
                <img class="lightbox" data-caption="Yellowstone Rainbow" src="/images/photography/IMG_7873.jpg">
            </div>
            <div class="box outline">
                <img class="lightbox" data-caption="Seattle skyline from Kerry Park" src="/images/photography/IMG_8738.jpg">
            </div>
            <div class="box outline wide">
                <img class="lightbox" data-caption="Golden Gardens in Seattle" src="/images/photography/IMG_8815.jpg">
            </div>
            <div class="box outline">
                <img class="lightbox" data-caption="Hiking @ Poo Poo Point" src="/images/photography/IMG_8555.jpg">
            </div>
            
            <div class="box outline tall">
                <img class="lightbox" data-caption="Fall train in Ballard" src="/images/photography/IMG_8706.jpg">
            </div>
            <div class="box outline tall">
                <img class="lightbox" data-caption="Sunny day near Portland" src="/images/photography/IMG_8105.jpg">
            </div>
            <div class="box outline">
                <img class="lightbox" data-caption="Hiking Rattlesnake Lake" src="/images/photography/IMG_8843.jpg">
            </div>
        </div>

        <p class="center copywrite">© 2026 Silas Unger</p>
        <script src="/lightbox.js"></script>
        <script src="/parallax.js"></script>
    </body>
</html>
